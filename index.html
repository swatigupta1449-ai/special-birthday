<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>HAPPY BIRTHDAY!</h1>
        <p class="subtext">THE WORLD JUST GOT LUCKIER SINCE</p>
        
        <div class="timer">
            <div class="box"><span id="days">0</span><p>Days</p></div>
            <div class="box"><span id="hours">0</span><p>Hours</p></div>
            <div class="box"><span id="minutes">0</span><p>Minutes</p></div>
            <div class="box"><span id="seconds">0</span><p>Seconds</p></div>
        </div>
    </div>
    <canvas id="heart"></canvas>
    <script src="script.js"></script>
</body>
</html>
